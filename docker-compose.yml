services:

  postgres:
    image: postgres:17

    container_name: smartbox-postgres

    restart: always

    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}

    ports:
      - "${DATABASE_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7

    container_name: smartbox-redis

    restart: always

    ports:
      - "${REDIS_PORT}:6379"

volumes:
  postgres_data: